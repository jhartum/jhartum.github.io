<style>
  /* ===== gruvbox dark hard ===== */
  :root{
    --bg:#1d2021;
    --bg1:#141617;
    --bg2:#282828;
    --bg3:#3c3836;
    --fg:#ebdbb2;
    --fg-bright:#fbf1c7;
    --fg-dim:#d5c4a1;
    --gray:#928374;
    --faint:#5a524c;
    --tilde:#45403d;
    --orange:#fe8019;
    --yellow:#fabd2f;
    --aqua:#8ec07c;
    --green:#b8bb26;
    --blue:#83a598;
    --red:#fb4934;
    --purple:#d3869b;
    --sel:#504945;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  ::selection{background:var(--sel);}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    font-size:14px;line-height:1.62;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ===== tmux session ===== */
  .tmux{flex:1;display:flex;min-height:0;}
  .pane{min-width:0;}

  /* ===== left pane: vim ===== */
  .vimpane{
    flex:1.6;display:flex;flex-direction:column;
    overflow-y:auto;overscroll-behavior:contain;
    scroll-behavior:smooth;
  }

  .tabline{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:stretch;
    background:var(--bg1);
    font-size:12px;
    border-bottom:1px solid #0f1010;
    flex:0 0 auto;
  }
  .tabline .tab{
    border:0;cursor:pointer;
    font:500 12px/1 'IBM Plex Mono',monospace;
    padding:10px 18px 9px;
    background:transparent;color:var(--gray);
    border-top:2px solid transparent;
    transition:.15s;
  }
  .tabline .tab:hover{color:var(--fg);}
  html[data-lang="ru"] .tab[data-set="ru"],
  html[data-lang="en"] .tab[data-set="en"]{
    background:var(--bg);color:var(--yellow);
    border-top-color:var(--yellow);
  }
  .tabline .fill{flex:1;}
  .tabline .hardcopy{
    border:0;cursor:pointer;background:transparent;
    font:500 12px/1 'IBM Plex Mono',monospace;
    color:var(--gray);padding:10px 18px 9px;transition:.15s;
  }
  .tabline .hardcopy:hover{color:var(--green);}

  .buf{
    width:100%;max-width:880px;margin:0 auto;
    padding:30px 24px 24px 0;
    flex:1 0 auto;
  }
  .row{display:flex;align-items:baseline;}
  .num{
    flex:0 0 56px;text-align:right;padding-right:20px;
    font-size:11px;color:var(--faint);user-select:none;
  }
  .num.tilde{color:var(--tilde);font-size:13px;}
  .tx{flex:1;min-width:0;white-space:pre-wrap;word-break:break-word;}

  .r-blank{height:18px;}
  .mk{color:var(--orange);font-weight:700;}

  .r-h1 .tx{font-size:32px;font-weight:700;line-height:1.25;letter-spacing:-.01em;}
  .r-h1 .ttl{color:var(--fg-bright);}

  .r-q .tx{color:var(--blue);font-size:13.5px;}
  .r-q .ok{color:var(--green);}
  .r-q .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:7px;vertical-align:1px;
    box-shadow:0 0 0 0 rgba(184,187,38,.55);animation:pulse 2.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(184,187,38,.5)}70%{box-shadow:0 0 0 7px rgba(184,187,38,0)}100%{box-shadow:0 0 0 0 rgba(184,187,38,0)}}

  .r-p .tx{color:var(--fg-dim);max-width:72ch;}

  .r-h2{margin-top:26px;}
  .r-h2 .tx{font-size:15px;font-weight:700;color:var(--aqua);letter-spacing:.02em;}

  .r-h3{margin-top:10px;}
  .r-h3 .tx{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;font-size:16px;font-weight:700;}
  .r-h3 .ttl{color:var(--fg-bright);}
  .r-h3 .per{margin-left:auto;color:var(--gray);font-size:12.5px;font-weight:400;white-space:nowrap;}
  .r-h3 .nda{color:var(--red);font-size:11px;font-weight:500;border:1px solid #4a2a22;border-radius:4px;padding:1px 6px;align-self:center;}

  .r-em .tx{font-style:italic;font-size:12.5px;color:var(--green);}

  .r-li .tx{padding-left:18px;text-indent:-18px;font-size:13.5px;}
  .r-li .mk{font-weight:400;}
  .r-li .key{color:var(--blue);}

  .r-sk .tx{padding-left:18px;text-indent:-18px;font-size:13.5px;}
  .r-sk .key{display:inline-block;width:12ch;text-indent:0;color:var(--blue);}

  .r-meta{margin-top:2px;}
  .r-meta .tx{font-size:12px;color:var(--gray);}
  .r-meta .key{color:var(--gray);}

  .tx a{color:var(--fg);text-decoration:none;border-bottom:1px solid #4d4435;transition:.15s;}
  .tx a:hover{color:var(--yellow);border-bottom-color:var(--yellow);}

  .statusline{
    position:sticky;bottom:0;z-index:20;

    background:var(--bg3);color:#a89984;
    font-size:11.5px;font-weight:500;
    flex:0 0 auto;

  .sl-mode{background:var(--green);color:var(--bg);font-weight:700;letter-spacing:.04em;}
  .sl-file{color:var(--fg);background:#46413e;}
  .sl-spring{flex:1;padding:0;}
  .sl-ft{color:#a89984;}
  .sl-pos{background:var(--sel);color:var(--fg);}
  .sl-pct{background:var(--green);color:var(--bg);font-weight:700;}

  /* ===== right pane: zsh ===== */
  .termpane{
    flex:1;display:flex;flex-direction:column;
    background:#191b1c;
    border-left:1px solid #0c0e0e;
    cursor:text;
  }
  .termbody{

  .tl{white-space:pre-wrap;word-break:break-word;min-height:1.2em;}
  .tl .tu{color:var(--green);font-weight:600;}
  .tl .tp{color:var(--blue);}
  .tl .td{color:var(--faint);}
  .tl .tcmd{color:var(--fg-bright);}
  .tl .tdim{color:var(--gray);}
  .tl .tfaint{color:var(--faint);}
  .tl .tkey{color:var(--blue);}
  .tl .tok{color:var(--green);}
  .tl .tacc{color:var(--yellow);}
  .tl .torange{color:var(--orange);}
  .tl .terr{color:var(--red);}
  .tl .taqua{color:var(--aqua);}
  .tl .thit{color:var(--bg);background:var(--yellow);border-radius:2px;padding:0 2px;}
  .tl a{color:var(--fg);text-decoration:none;border-bottom:1px solid #4d4435;}
  .tl a:hover{color:var(--yellow);border-bottom-color:var(--yellow);}

  .tfetch{display:flex;gap:20px;align-items:flex-start;margin:4px 0 6px;}
  .tfetch .blocks{line-height:1.1;font-size:13px;letter-spacing:-1px;flex:0 0 auto;padding-top:3px;}
  .tfetch .finfo{min-width:0;}
  .tfetch .finfo .tl{min-height:auto;}

  .tprompt{display:flex;align-items:baseline;gap:0;}
  .tprompt .tin{
    flex:1;min-width:40px;border:0;outline:0;background:transparent;
    color:var(--fg-bright);font:400 12.5px/1.65 'IBM Plex Mono',monospace;

  }

  /* ===== tmux status bar ===== */
  .tmuxbar{
    flex:0 0 auto;display:flex;align-items:center;
    background:var(--bg3);color:#a89984;
    font-size:11.5px;font-weight:500;
    border-top:1px solid #0f1010;
  }
  .tmuxbar span{padding:4px 10px;white-space:nowrap;}
  .tmuxbar .sess{background:var(--aqua);color:var(--bg);font-weight:700;}
  .tmuxbar .win{cursor:pointer;}
  .tmuxbar .win.cur{color:var(--fg-bright);}
  .tmuxbar .spring{flex:1;padding:0;}
  .tmuxbar .host{color:var(--fg-dim);}
  .tmuxbar .clock{background:var(--sel);color:var(--fg);}

  /* ===== narrow screens: только vim ===== */
  @media (max-width:1100px){
    .termpane{display:none;}
    .tmuxbar .win[data-w="1"]{display:none;}
  }
  @media (max-width:600px){
    body{font-size:13px;}
    .buf{padding-right:14px;}
    .num{flex-basis:36px;padding-right:10px;}
    .r-h1 .tx{font-size:24px;}
    .r-h3 .per{margin-left:0;width:100%;}
    .r-sk .key{width:auto;display:inline;}
    .sl-ft,.sl-enc{display:none;}
    .tmuxbar .host{display:none;}
  }

  /* ===== print → светлый документ для HR ===== */
  @media print{
    @page{size:A4;margin:14mm;}
    html,body{height:auto;overflow:visible;display:block;}
    body{background:#fff;color:#1a1a1a;font-size:11px;}
    .tmux{display:block;}
    .vimpane{overflow:visible;height:auto;display:block;}
    .tabline,.statusline,.termpane,.tmuxbar{display:none;}
    .buf{max-width:none;padding:0;}
    .num{display:none;}
    .row.r-tilde{display:none;}
    .r-blank{height:10px;}
    .mk{color:#9a6a16;}
    .r-h1 .ttl{color:#111;}
    .r-h1 .tx{font-size:24pt;}
    .r-q .tx{color:#2f5d86;}
    .r-q .ok{color:#3f6b2f;}
    .r-q .pulse{animation:none;background:#3f6b2f;box-shadow:none;}
    .r-p .tx{color:#222;}
    .r-h2 .tx{color:#427b58;}
    .r-h3 .ttl{color:#111;}
    .r-h3 .per,.r-meta .tx,.r-meta .key{color:#666;}
    .r-h3 .nda{color:#9d0006;border-color:#d8b8a8;}
    .r-em .tx{color:#3f6b2f;}
    .r-li .tx{color:#222;}
    .r-li .key,.r-sk .key{color:#2f5d86;}
    .tx a{color:#3f6b2f;border-bottom:none;}
  }
</style>

let LANG = "ru";
function L(o){ return typeof o === "string" ? o : (o[LANG] ?? o.ru); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ================= vim buffer ================= */
function render(){
  const rows = [];
  const push = (cls, html, attrs) => rows.push({ cls, html, attrs: attrs || "" });

  push("h1", `<span class="mk"># </span><span class="ttl">${esc(L(DATA.name))}</span>`, `data-screen-label="whoami"`);
  push("blank", "");
  push("q", `<span class="mk">&gt; </span>${esc(L(DATA.role))}`);
  push("q", `<span class="mk">&gt; </span><span class="ok"><span class="pulse"></span>${esc(L(DATA.status))}</span>`);
  push("blank", "");
  push("p", esc(L(DATA.about)));
  push("blank", "");

  push("h2", `<span class="mk">## </span>${esc(L(DATA.sections.skills))}`, `id="skills" data-screen-label="skills"`);
  DATA.skills.forEach(s => {
    push("sk", `<span class="mk">- </span><span class="key">${esc(s.k)}</span>${esc(s.v)}`);
  });
  push("blank", "");

  push("h2", `<span class="mk">## </span>${esc(L(DATA.sections.experience))}`, `id="experience" data-screen-label="experience"`);
  DATA.experience.forEach(e => {
    push("blank", "");
    const nda = e.nda ? `<span class="nda">NDA</span>` : "";
    push("h3",
      `<span class="mk">### </span><span class="ttl">${esc(L(e.title))}</span>${nda}<span class="per">${esc(L(e.period))}</span>`,
      `id="exp-${e.id}" data-screen-label="exp: ${e.id}"`);
    push("em", `*${esc(L(e.role))} — ${esc(L(e.ctx))}*`);
    L(e.bullets).forEach(b => push("li", `<span class="mk">- </span>${esc(b)}`));
    push("meta", `<span class="key">stack:</span> ${esc(e.stack)}`);
  });
  push("blank", "");

  const c = DATA.contact;
  push("h2", `<span class="mk">## </span>${esc(L(DATA.sections.contact))}`, `id="contact" data-screen-label="contact"`);
  push("li", `<span class="mk">- </span><span class="key">email:</span> <a href="mailto:${c.email}">${c.email}</a>`);
  push("li", `<span class="mk">- </span><span class="key">telegram:</span> <a href="https://t.me/${c.telegram.replace("@","")}" target="_blank" rel="noopener">${c.telegram}</a>`);

  push("li", `<span class="mk">- </span><span class="key">languages:</span> ${esc(L(c.languages))}`);

  let html = rows.map((r, i) =>

  document.getElementById("buf").innerHTML = html;

}

/* ---- statusline: живой процент и строка ---- */
const vimPane = document.getElementById("vimPane");
function updateStatus(){
  const max = vimPane.scrollHeight - vimPane.clientHeight;
  const sc = vimPane.scrollTop;
  let pct;
  if (max <= 0) pct = "All";
  else if (sc <= 4) pct = "Top";
  else if (sc >= max - 4) pct = "Bot";
  else pct = Math.round(sc / max * 100) + "%";
  document.getElementById("slPct").textContent = pct;

  const paneTop = vimPane.getBoundingClientRect().top + 42;
  const rowEls = vimPane.querySelectorAll("#buf .row:not(.r-tilde)");
  let line = 1;
  for (let i = 0; i < rowEls.length; i++) {
    if (rowEls[i].getBoundingClientRect().bottom > paneTop) { line = i + 1; break; }
  }
  document.getElementById("slPos").textContent = line + ":1";
}
let ticking = false;
vimPane.addEventListener("scroll", () => {
  if (ticking) return;
  ticking = true;
  requestAnimationFrame(() => { updateStatus(); ticking = false; });
}, { passive: true });
window.addEventListener("resize", updateStatus);

/* ---- vim-движение: j k d u gg G ---- */
let lastKey = "";
window.addEventListener("keydown", (e) => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const t = e.target;
  if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
  const lh = 23;
  switch (e.key) {
    case "j": vimPane.scrollBy(0, lh); break;
    case "k": vimPane.scrollBy(0, -lh); break;
    case "d": vimPane.scrollBy(0, vimPane.clientHeight / 2); break;
    case "u": vimPane.scrollBy(0, -vimPane.clientHeight / 2); break;
    case "G": vimPane.scrollTo(0, vimPane.scrollHeight); break;
    case "g":
      if (lastKey === "g") { vimPane.scrollTo(0, 0); lastKey = ""; return; }
      break;
  }
  lastKey = e.key;
});

/* ---- язык = переключение буфера ---- */
function setLang(l){
  LANG = l;
  document.documentElement.lang = l;
  document.documentElement.setAttribute("data-lang", l);
  document.getElementById("slFile").textContent = "resume." + l + ".md";
  document.title = "resume." + l + ".md — " + (l === "ru" ? "Александр Брезгунов" : "Aleksandr Brezgunov");
  try{ localStorage.setItem("cv-term-lang", l); }catch(e){}
  render();
}

/* ================= zsh pane ================= */
const termBody = document.getElementById("termBody");
const termPane = document.getElementById("termPane");
let termInput = null;
const HIST = [];
let histIdx = -1;

function promptHTML(){
  return `<span class="tu">guest@cv</span><span class="td">:</span><span class="tp">~</span> <span class="td">$</span>`;
}
function tline(html, cls){
  const div = document.createElement("div");
  div.className = "tl" + (cls ? " " + cls : "");
  div.innerHTML = html;
  return div;
}
function termPrint(lines){
  (Array.isArray(lines) ? lines : [lines]).forEach(l => {
    termBody.insertBefore(typeof l === "string" ? tline(l) : l, termBody.lastElementChild);
  });
}
function termScrollEnd(){ termBody.scrollTop = termBody.scrollHeight; }

function neofetchEl(){
  const wrap = document.createElement("div");
  wrap.className = "tfetch";
  const cols1 = ["#3c3836","#fb4934","#b8bb26","#fabd2f","#83a598","#d3869b","#8ec07c","#d5c4a1"];
  const cols2 = ["#928374","#fb4934","#b8bb26","#fabd2f","#83a598","#d3869b","#8ec07c","#fbf1c7"];
  const strip = (cols) => cols.map(c => `<span style="color:${c}">███</span>`).join("");
  const info = [
    `<span class="tok">guest</span><span class="tfaint">@</span><span class="tok">cv</span>`,
    `<span class="tfaint">───────────────</span>`,
    `<span class="tkey">name</span><span class="tfaint">:</span>   ${esc(L(DATA.name))}`,
    `<span class="tkey">role</span><span class="tfaint">:</span>   ${esc(L(DATA.role))}`,
    `<span class="tkey">status</span><span class="tfaint">:</span> <span class="tok">● ${esc(L(DATA.status))}</span>`,
    `<span class="tkey">email</span><span class="tfaint">:</span>  <a href="mailto:${DATA.contact.email}">${DATA.contact.email}</a>`,
    `<span class="tkey">github</span><span class="tfaint">:</span> <a href="https://${DATA.contact.github}" target="_blank" rel="noopener">${DATA.contact.github}</a>`
  ];
  wrap.innerHTML = `
    <div class="blocks">${strip(cols1)}<br>${strip(cols2)}</div>
    <div class="finfo">${info.map(i => `<div class="tl">${i}</div>`).join("")}</div>`;
  return wrap;
}

const FILES = {
  "about.md": () => [esc(L(DATA.about))],
  "skills.md": () => DATA.skills.map(s => `<span class="td">-</span> <span class="tkey">${s.k}:</span> ${esc(s.v)}`),
  "contact.json": () => {
    const c = DATA.contact;
    return [
      `<span class="td">{</span>`,
      `  <span class="tkey">"email"</span><span class="td">:</span> <span class="tok">"<a href="mailto:${c.email}">${c.email}</a>"</span><span class="td">,</span>`,
      `  <span class="tkey">"telegram"</span><span class="td">:</span> <span class="tok">"<a href="https://t.me/${c.telegram.replace("@","")}" target="_blank" rel="noopener">${c.telegram}</a>"</span><span class="td">,</span>`,
      `  <span class="tkey">"github"</span><span class="td">:</span> <span class="tok">"<a href="https://${c.github}" target="_blank" rel="noopener">${c.github}</a>"</span><span class="td">,</span>`,
      `  <span class="tkey">"location"</span><span class="td">:</span> <span class="tok">"${esc(L(c.city))}"</span>`,
      `<span class="td">}</span>`
    ];
  }
};
DATA.experience.forEach(e => {
  FILES["experience/" + e.id + ".md"] = () => {
    const out = [];
    out.push(`<span class="torange">#</span> <span class="tacc">${esc(L(e.title))}</span> <span class="tdim">· ${esc(L(e.period))}</span>${e.nda ? ` <span class="terr">[NDA]</span>` : ""}`);
    out.push(`<span class="taqua">*${esc(L(e.role))} — ${esc(L(e.ctx))}*</span>`);
    L(e.bullets).forEach(b => out.push(`<span class="td">-</span> ${esc(b)}`));
    out.push(`<span class="tdim">stack: ${esc(e.stack)}</span>`);
    return out;
  };
});

function grepAll(q){
  const needle = q.toLowerCase();
  const hits = [];
  const mark = (text) => esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "ig"), m => `<span class="thit">${m}</span>`);
  if (L(DATA.about).toLowerCase().includes(needle)) hits.push(`<span class="tkey">about.md</span><span class="td">:</span> ${mark(L(DATA.about))}`);
  DATA.skills.forEach(s => {
    if ((s.k + " " + s.v).toLowerCase().includes(needle)) hits.push(`<span class="tkey">skills.md</span><span class="td">:</span> ${mark(s.k + ": " + s.v)}`);
  });
  DATA.experience.forEach(e => {
    const f = `experience/${e.id}.md`;
    L(e.bullets).forEach(b => {
      if (b.toLowerCase().includes(needle)) hits.push(`<span class="tkey">${f}</span><span class="td">:</span> ${mark(b)}`);
    });
    if (e.stack.toLowerCase().includes(needle)) hits.push(`<span class="tkey">${f}</span><span class="td">:</span> ${mark("stack: " + e.stack)}`);
  });
  return hits;
}

const CMDS = {
  help(){
    return [
      `<span class="tdim">${LANG === "ru" ? "доступные команды:" : "available commands:"}</span>`,
      `  <span class="tacc">whoami</span>          <span class="tdim">${LANG === "ru" ? "кто это" : "who is this"}</span>`,
      `  <span class="tacc">ls</span> <span class="tdim">[dir]</span>        <span class="tdim">${LANG === "ru" ? "список файлов" : "list files"}</span>`,
      `  <span class="tacc">cat</span> <span class="tdim">&lt;file&gt;</span>      <span class="tdim">${LANG === "ru" ? "показать файл" : "show a file"}</span>`,
      `  <span class="tacc">grep</span> <span class="tdim">&lt;text&gt;</span>     <span class="tdim">${LANG === "ru" ? "поиск по резюме" : "search the resume"}</span>`,
      `  <span class="tacc">neofetch</span>        <span class="tdim">${LANG === "ru" ? "сводка" : "summary"}</span>`,
      `  <span class="tacc">clear</span>           <span class="tdim">${LANG === "ru" ? "очистить" : "clear screen"}</span>`
    ];
  },
  whoami(){
    return [`${esc(L(DATA.name))} <span class="tdim">— ${esc(L(DATA.role))}</span>`];
  },
  neofetch(){ return [neofetchEl()]; },
  ls(arg){
    if (!arg || arg === "." || arg === "~"){
      return [`<span class="tdim">about.md   skills.md   contact.json</span>   <span class="tp">experience/</span>`];
    }
    if (arg.replace(/\/$/, "") === "experience"){
      return [DATA.experience.map(e => `<span class="tdim">${e.id}.md</span>`).join("   ")];
    }
    return [`<span class="terr">ls: ${esc(arg)}: No such file or directory</span>`];
  },
  cat(arg){
    if (!arg) return [`<span class="terr">cat: ${LANG === "ru" ? "укажи файл" : "specify a file"} — ${LANG === "ru" ? "например" : "e.g."} <span class="tacc">cat skills.md</span></span>`];
    const key = arg.replace(/^\.\//, "").replace(/^~\//, "");
    const f = FILES[key] || FILES[key + ".md"] || FILES["experience/" + key] || FILES["experience/" + key + ".md"];
    if (f) return f();
    return [`<span class="terr">cat: ${esc(arg)}: No such file or directory</span>`];
  },
  grep(arg){
    if (!arg) return [`<span class="terr">grep: ${LANG === "ru" ? "что ищем?" : "search for what?"} — ${LANG === "ru" ? "например" : "e.g."} <span class="tacc">grep Python</span></span>`];
    const hits = grepAll(arg);
    return hits.length ? hits : [`<span class="tdim">grep: ${LANG === "ru" ? "ничего не найдено по запросу" : "no matches for"} «${esc(arg)}»</span>`];
  },
  clear(){ 
    [...termBody.querySelectorAll(":scope > *:not(:last-child)")].forEach(n => n.remove());
    return [];
  },
  vim(){ return [`<span class="tdim">${LANG === "ru" ? "он уже открыт — посмотри налево ←" : "it's already open — look left ←"}</span>`]; },
  nvim(){ return CMDS.vim(); },
  exit(){ return [`<span class="tdim">${LANG === "ru" ? "эта сессия персистентна. хорошая попытка." : "this session is persistent. nice try."}</span>`]; },
  sudo(arg){
    if ((arg || "").startsWith("hire")) {
      return [
        `<span class="tdim">[sudo] password for guest: ********</span>`,
        `<span class="tok">${LANG === "ru" ? "доступ разрешён" : "access granted"} →</span> <a href="mailto:${DATA.contact.email}">${DATA.contact.email}</a>`
      ];
    }
    return [`<span class="terr">guest is not in the sudoers file. This incident will be reported.</span>`];
  }
};

function runCommand(raw){
  const input = raw.trim();
  termPrint(`${promptHTML()} <span class="tcmd">${esc(raw)}</span>`);
  if (!input){ termScrollEnd(); return; }
  HIST.push(raw); histIdx = HIST.length;
  const sp = input.indexOf(" ");
  const cmd = sp === -1 ? input : input.slice(0, sp);
  const arg = sp === -1 ? "" : input.slice(sp + 1).trim();
  const fn = CMDS[cmd];
  if (fn) termPrint(fn(arg));
  else termPrint(`<span class="terr">zsh: command not found: ${esc(cmd)}</span> <span class="tdim">— try</span> <span class="tacc">help</span>`);
  termScrollEnd();
}

function buildPromptLine(){
  const line = document.createElement("div");
  line.className = "tl tprompt";
  line.innerHTML = `${promptHTML()}`;
  const input = document.createElement("input");
  input.className = "tin";
  input.setAttribute("autocomplete", "off");
  input.setAttribute("autocapitalize", "off");
  input.setAttribute("spellcheck", "false");
  input.setAttribute("aria-label", "terminal input");
  line.appendChild(input);
  termInput = input;
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter"){ const v = input.value; input.value = ""; runCommand(v); }
    else if (e.key === "ArrowUp"){ if (histIdx > 0){ histIdx--; input.value = HIST[histIdx] || ""; } e.preventDefault(); }
    else if (e.key === "ArrowDown"){ if (histIdx < HIST.length){ histIdx++; input.value = HIST[histIdx] || ""; } e.preventDefault(); }
    else if (e.key === "l" && e.ctrlKey){ CMDS.clear(); e.preventDefault(); }
  });
  return line;
}

function initTerm(){
  termBody.innerHTML = "";
  termBody.appendChild(buildPromptLine());
  termPrint(`${promptHTML()} <span class="tcmd">neofetch</span>`);
  termPrint(CMDS.neofetch());
  termPrint(`<span class="tfaint"># ${LANG === "ru" ? "интерактивный терминал — набери" : "interactive shell — type"} <span class="tacc">help</span></span>`);
  termScrollEnd();
}
termPane.addEventListener("click", () => { if (termInput) termInput.focus(); });

/* ---- tmux bar ---- */
function focusPane(which){
  document.getElementById("win0").textContent = which === "vim" ? "0:vim*" : "0:vim-";
  document.getElementById("win1").textContent = which === "zsh" ? "1:zsh*" : "1:zsh-";
  document.getElementById("win0").classList.toggle("cur", which === "vim");
  document.getElementById("win1").classList.toggle("cur", which === "zsh");
  if (which === "zsh" && termInput) termInput.focus();
}
termPane.addEventListener("click", () => focusPane("zsh"));
vimPane.addEventListener("click", () => focusPane("vim"));

function tickClock(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("tmuxClock").textContent =
    `${hh}:${mm} ${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${String(d.getFullYear()).slice(2)}`;
}
tickClock();
setInterval(tickClock, 30000);

(function(){
  let saved; try{ saved = localStorage.getItem("cv-term-lang"); }catch(e){}
  setLang(saved === "en" ? "en" : "ru");
  initTerm();
})();
</script>
