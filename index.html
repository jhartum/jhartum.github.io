<!DOCTYPE html>
<html lang="ru" data-lang="ru" data-typing="on" data-scanlines="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/cv — Aleksandr Brezgunov — Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16130e;
    --win:#1c1812;
    --chrome:#221d16;
    --fg:#e8e0d0;
    --dim:#9a9080;
    --faint:#756c5b;
    --line:#2c2620;
    --green:#9bbf7e;   /* user */
    --blue:#7fa9cf;    /* path */
    --accent:#e3a857;  /* accent / headings (tweakable) */
    --red:#d98b6f;     /* nda / dot */
    --sel:#3a3326;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:var(--sel);}
  body{
    background:
      radial-gradient(1200px 600px at 70% -10%, #221c14 0%, transparent 60%),
      var(--bg);
    color:var(--fg);
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    font-size:14px;line-height:1.65;
    -webkit-font-smoothing:antialiased;
    padding:40px 20px 80px;
    min-height:100vh;
  }
  /* CRT scanlines (tweak, off by default) */
  html[data-scanlines="on"] body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.13) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }

  .win{
    max-width:940px;margin:0 auto;
    background:var(--win);
    border:1px solid var(--line);
    border-radius:12px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.03) inset;
    overflow:hidden;
  }

  /* title bar */
  .bar{
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;background:var(--chrome);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:10;
    backdrop-filter:blur(6px);
  }
  .dots{display:flex;gap:8px;flex:0 0 auto;}
  .dots i{width:12px;height:12px;border-radius:50%;display:block;}
  .dots i:nth-child(1){background:#e06c5b;}
  .dots i:nth-child(2){background:#e3b341;}
  .dots i:nth-child(3){background:#88c07a;}
  .bar .ttl{color:var(--faint);font-size:12.5px;letter-spacing:.02em;flex:1 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bar .ttl b{color:var(--dim);font-weight:500;}
  .lang{flex:0 0 auto;display:flex;gap:2px;background:#0f0d09;border:1px solid var(--line);border-radius:7px;padding:2px;}
  .lang button{border:0;background:transparent;color:var(--faint);cursor:pointer;font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.06em;padding:5px 10px;border-radius:5px;transition:.15s;}
  .lang button:hover{color:var(--fg);}
  html[data-lang="ru"] .lang button[data-set="ru"],
  html[data-lang="en"] .lang button[data-set="en"]{background:var(--accent);color:#1c1812;}

  /* nav chips */
  .nav{display:flex;flex-wrap:wrap;gap:7px;padding:13px 18px;border-bottom:1px solid var(--line);background:#191510;}
  .nav .hint{color:var(--faint);font-size:11.5px;margin-right:4px;align-self:center;}
  .nav a{
    text-decoration:none;color:var(--dim);white-space:nowrap;
    font-size:12px;padding:4px 10px;border:1px solid var(--line);
    border-radius:6px;background:#14110c;transition:.15s;
  }
  .nav a:hover{color:var(--accent);border-color:#3d3528;background:#1f1a13;}
  .nav a::before{content:"$ ";color:var(--green);}

  /* body */
  .term{padding:22px 22px 14px;}
  .block{padding:10px 0;}
  .block + .block{border-top:1px dashed #241f18;}
  [id]{scroll-margin-top:72px;}
  .block:target{animation:targetflash 1.4s ease;}
  @keyframes targetflash{
    0%{background:color-mix(in oklab, var(--accent) 12%, transparent);}
    100%{background:transparent;}
  }

  .cmd{white-space:pre-wrap;word-break:break-word;}
  .usr{color:var(--green);font-weight:600;}
  .punc{color:var(--faint);}
  .path{color:var(--blue);}
  .pr{color:var(--fg);}        /* $ */
  .ci{color:var(--accent);}    /* command itself */
  .flag{color:var(--dim);}

  /* typing caret */
  .block.typing .ci::after{
    content:"";display:inline-block;width:8px;height:15px;
    background:var(--accent);vertical-align:-2px;margin-left:1px;
    animation:blink 1.1s steps(1) infinite;
  }

  .out{margin:8px 0 2px;}

  /* reveal: blocks fade in on scroll, output appears after command "runs" */
  .reveal{opacity:0;transform:translateY(6px);}
  .reveal.on{opacity:1;transform:none;transition:opacity .4s ease, transform .4s ease;}
  .block .out{opacity:0;transform:translateY(4px);}
  .block.done .out{opacity:1;transform:none;transition:opacity .35s ease, transform .35s ease;}
  @media (prefers-reduced-motion:reduce){
    .reveal,.block .out{opacity:1;transform:none;transition:none;animation:none;}
    .who .status .pulse{animation:none;}
  }

  /* whoami output */
  .who .name{font-size:32px;font-weight:700;letter-spacing:-.01em;color:#fbf3e2;line-height:1.15;}
  .who .role{margin-top:6px;color:var(--blue);font-size:13.5px;letter-spacing:.02em;}
  .who .role b{color:var(--accent);font-weight:600;}
  .who .status{margin-top:12px;display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--green);white-space:nowrap;
    border:1px solid #38452c;background:#1b2114;border-radius:999px;padding:5px 13px;}
  .who .status .pulse{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(155,191,126,.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(155,191,126,.55)}70%{box-shadow:0 0 0 7px rgba(155,191,126,0)}100%{box-shadow:0 0 0 0 rgba(155,191,126,0)}}

  .about{color:var(--fg);max-width:74ch;font-size:14px;line-height:1.7;}

  /* skills grid */
  .skills{display:grid;grid-template-columns:max-content 1fr;gap:6px 22px;font-size:13.5px;align-items:baseline;}
  .skills dt{color:var(--accent);white-space:nowrap;}
  .skills dd{margin:0;color:var(--fg);}
  .skills .sep{color:var(--faint);}

  /* tree */
  .tree{font-size:13px;line-height:1.9;}
  .tree .root{color:var(--blue);}
  .tree .branch{color:var(--faint);}
  .tree a.dirlink{text-decoration:none;border-bottom:1px dashed #3d3528;transition:.15s;}
  .tree a.dirlink .dir{color:var(--accent);}
  .tree a.dirlink:hover{border-bottom-color:var(--accent);}
  .tree a.dirlink:hover .dir{color:#fbf3e2;}
  .tree .when{color:var(--dim);}
  .tree .nda{color:var(--red);}
  .tree .cm{color:var(--faint);font-size:11.5px;}

  /* experience */
  .exp .h{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .exp .hl{display:flex;align-items:baseline;gap:10px;flex:1 1 auto;min-width:0;flex-wrap:wrap;}
  .exp .mk{color:var(--accent);font-weight:700;font-size:16px;}
  .exp .t{font-size:18px;font-weight:700;color:#fbf3e2;letter-spacing:-.01em;}
  .exp .nda{color:var(--red);font-size:11px;font-weight:500;border:1px solid #4a322a;border-radius:4px;padding:1px 6px;white-space:nowrap;}
  .exp .per{margin-left:auto;color:var(--dim);font-size:12.5px;white-space:nowrap;flex:0 0 auto;}
  .exp .meta{margin-top:4px;color:var(--blue);font-size:12.5px;}
  .exp .meta .ctx{color:var(--faint);font-style:italic;}
  .exp ul{list-style:none;margin:11px 0 0;padding:0;}
  .exp li{position:relative;padding-left:20px;margin-bottom:6px;font-size:13.5px;line-height:1.6;color:var(--fg);}
  .exp li::before{content:"›";position:absolute;left:4px;top:0;color:var(--green);font-weight:700;}
  .exp .stack{margin-top:10px;color:var(--dim);font-size:12px;}
  .exp .stack b{color:var(--faint);font-weight:500;}
  .exp-block + .exp-block{margin-top:6px;}

  /* json contact */
  .json{font-size:13px;line-height:1.85;white-space:pre-wrap;}
  .json .br{color:var(--faint);}
  .json .k{color:var(--blue);}
  .json .v{color:var(--green);}
  .json a{color:var(--green);text-decoration:none;border-bottom:1px solid #2f3a25;}
  .json a:hover{color:var(--accent);border-color:#3d3528;}

  /* end cursor */
  .end{padding:6px 0 4px;}
  .end .cur{display:inline-block;width:9px;height:17px;background:var(--accent);vertical-align:-3px;animation:blink 1.1s steps(1) infinite;margin-left:4px;}
  @keyframes blink{50%{opacity:0;}}

  @media (max-width:560px){
    body{padding:16px 8px 60px;font-size:13px;}
    .who .name{font-size:25px;}
    .skills{grid-template-columns:1fr;gap:1px 0;}
    .skills dt{margin-top:8px;}
    .exp .per{margin-left:0;width:100%;}
  }

  /* print → clean light PDF for HR */
  @media print{
    @page{size:A4;margin:14mm;}
    body{background:#fff;color:#1a1a1a;padding:0;font-size:11px;}
    body::after{display:none;}
    .win{border:none;box-shadow:none;max-width:none;border-radius:0;background:#fff;}
    .bar,.nav,.end{display:none;}
    .term{padding:0;}
    .block + .block{border-top:1px solid #e6e2d8;}
    .reveal,.block .out{opacity:1 !important;transform:none !important;transition:none;animation:none;}
    .block.typing .ci::after{display:none;}
    .usr{color:#3f6b2f;} .path{color:#2f5d86;} .ci{color:#9a6a16;} .pr,.punc,.flag{color:#666;}
    .who .name,.exp .t{color:#111;}
    .who .role{color:#2f5d86;} .who .role b,.exp .mk,.skills dt{color:#9a6a16;}
    .who .status{color:#3f6b2f;border-color:#bcd0aa;background:#f1f6ea;}
    .about,.exp li,.skills dd{color:#222;}
    .tree a.dirlink{border-bottom:none;text-decoration:none;}
    .tree .dir,.tree a.dirlink .dir{color:#9a6a16;} .tree .root{color:#2f5d86;} .tree .when,.exp .per{color:#555;}
    .exp .stack{color:#777;} .json .v,.json a{color:#3f6b2f;} .json .k{color:#2f5d86;}
    .exp-block{break-inside:avoid;}
  }
</style>
</head>
<body>
<div class="win">
  <div class="bar">
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="ttl"><b>~/cv</b> — brezgunov — zsh</div>
    <div class="lang">
      <button data-set="ru" onclick="setLang('ru')">RU</button>
      <button data-set="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
  <nav class="nav">
    <span class="hint" data-ru="листайте вниз — всё уже выполнено:" data-en="just scroll — everything already ran:"></span>
    <a href="#whoami">whoami</a>
    <a href="#skills">skills</a>
    <a href="#experience">experience</a>
    <a href="#contact">contact</a>
  </nav>
  <div class="term" id="term"></div>
</div>
<div id="cv-tweaks-root"></div>

<script>
const DATA = {
  user: "guest",
  name: { ru: "Александр Брезгунов", en: "Aleksandr Brezgunov" },
  role: { ru: "Software Engineer · Backend · 5+ лет", en: "Software Engineer · Backend · 5+ yrs" },
  status: { ru: "доступен для работы", en: "available for work" },
  about: {
    ru: "Backend-инженер с 5+ годами коммерческого опыта. Финтех-платформы, CRM-системы, интеграции, внутренние сервисы и AI-функциональность. Проектирую и разрабатываю backend со сложной доменной логикой, автоматизирую бизнес-процессы.",
    en: "Backend engineer with 5+ years of commercial experience. Fintech platforms, CRM systems, integrations, internal services, and AI functionality. I design and build backends with complex domain logic and automate business processes."
  },
  skills: [
    { k: { ru: "languages", en: "languages" }, v: "Python · TypeScript · Kotlin · SQL" },
    { k: { ru: "backend",   en: "backend" },   v: "Litestar · FastAPI · Django · SQLAlchemy · Ktor" },
    { k: { ru: "frontend",  en: "frontend" },  v: "React · HTMX" },
    { k: { ru: "data/async",en: "data/async" },v: "PostgreSQL · Redis · RabbitMQ · Celery · TaskIQ" },
    { k: { ru: "delivery",  en: "delivery" },  v: "Docker · Docker Swarm · GitLab CI · S3" },
    { k: { ru: "practices", en: "practices" }, v: "DDD · Clean Architecture · CQRS · Event-Driven · TDD" },
    { k: { ru: "tools",     en: "tools" },     v: "LazyVim · Claude Code · pi.dev · Ubuntu" },
  ],
  experience: [
    {
      id: "neshkola", dir: "neshkola",
      title: { ru: "НеШкола", en: "NeSchool" },
      period: { ru: "2022 — наст.вр.", en: "2022 — present" },
      role: { ru: "Software Engineer", en: "Software Engineer" },
      ctx: { ru: "франчайзинговая сеть музыкальных школ", en: "music school franchise network" },
      bullets: {
        ru: [
          "Спроектировал и развиваю core CRM сети с нуля — мультиарендная платформа: расписание, договоры, платежи, бухгалтерия, отчётность.",
          "Связал CRM с внешней системой продаж и каналами коммуникации — автоматизация лидов, маршрутизация звонков, уведомления.",
          "Построил AI-анализ звонков — транскрипция и оценка качества разговора заменили ручной разбор, результат уходит прямо в CRM.",
          "Разработал desktop-приложение для защищённой доставки учебных материалов — синхронизация и авто-обновление."
        ],
        en: [
          "Designed and grew the network's core CRM from scratch — a multi-tenant platform: scheduling, contracts, payments, accounting, reporting.",
          "Connected the CRM to an external sales system and communication channels — automated leads, call routing, notifications.",
          "Built AI call analysis — transcription and conversation-quality scoring replaced manual review, with results flowing straight into the CRM.",
          "Built a desktop app for secure delivery of teaching materials — sync and auto-update."
        ]
      },
      stack: "Python · Litestar · PostgreSQL · RabbitMQ · React/TS · Yandex Cloud · Docker Swarm"
    },
    {
      id: "fintech", dir: "fintech-platform", nda: true,
      title: { ru: "Финтех-платёжная платформа", en: "Fintech Payment Platform" },
      period: { ru: "2025 — 2026", en: "2025 — 2026" },
      role: { ru: "Software Engineer", en: "Software Engineer" },
      ctx: { ru: "выплаты, сверка чеков, антифрод, интеграции с провайдерами", en: "payouts, receipt verification, anti-fraud, provider integrations" },
      bullets: {
        ru: [
          "Спроектировал и реализовал backend платёжной платформы с нуля — полный цикл выплат от заявки и резервирования до сверки и учёта.",
          "Подключил несколько платёжных провайдеров, автоматизировав операции, которые раньше выполнялись операторами вручную.",
          "Обеспечил корректность финансовых операций при сбоях, повторах запросов и конкурентном доступе — без потерь и дублей."
        ],
        en: [
          "Designed and built a payment platform backend from scratch — the full payout lifecycle from request and reservation to reconciliation and accounting.",
          "Integrated several payment providers, automating operations previously done manually by operators.",
          "Ensured correctness of financial operations under failures, retries, and concurrent access — no losses or duplicates."
        ]
      },
      stack: "Python · Litestar · HTMX · PostgreSQL · Kotlin · Appium · Deno · Supabase · S3"
    },
    {
      id: "tayga", dir: "tayga.city",
      title: { ru: "Tayga.city", en: "Tayga.city" },
      period: { ru: "2021 — 2022", en: "2021 — 2022" },
      role: { ru: "Backend Developer", en: "Backend Developer" },
      ctx: { ru: "портал недвижимости от медиа Tayga.info", en: "real estate portal by Tayga.info media" },
      bullets: {
        ru: [
          "Рефакторил backend крупного портала недвижимости в продуктовой команде — внедрил DI, разделил слой команд и запросов.",
          "Усилил тестируемость и стабильность фоновой обработки изображений."
        ],
        en: [
          "Refactored the backend of a large real estate portal within a product team — introduced DI, split command and query layers.",
          "Improved testability and reliability of background image processing."
        ]
      },
      stack: "Python · Django · GraphQL · Celery · PostgreSQL · Redis"
    }
  ],
  contact: {
    email: "sasha.brezgunov@gmail.com",
    telegram: "@sk8destroy",
    city: { ru: "Москва · удалённо", en: "Moscow · remote" },
    languages: { ru: "ru native · en professional", en: "ru native · en professional" }
  }
};

let LANG = "ru";
const PLAYED = new Set();          // блоки, которые уже «выполнились» (не перепечатываем при смене языка)
let observer = null;

function L(o){ return typeof o === "string" ? o : (o[LANG] ?? o.ru); }
function reducedMotion(){ return window.matchMedia("(prefers-reduced-motion: reduce)").matches; }
function typingOn(){ return document.documentElement.dataset.typing !== "off" && !reducedMotion(); }

function prompt(path, cmd){
  return `<span class="cmd"><span class="usr">${DATA.user}@cv</span><span class="punc">:</span><span class="path">${path}</span> <span class="pr">$</span> <span class="ci">${cmd}</span></span>`;
}

function expCard(e){
  const bullets = L(e.bullets).map(b=>`<li>${b}</li>`).join("");
  const nda = e.nda ? `<span class="nda">NDA</span>` : "";
  return `
  <div class="block reveal exp-block" id="exp-${e.id}" data-key="exp-${e.id}" data-screen-label="exp: ${e.dir}">
    ${prompt("~/experience", `cat ${e.dir}.md`)}
    <div class="out exp">
      <div class="h">
        <div class="hl">
          <span class="mk">##</span>
          <span class="t">${L(e.title)}</span> ${nda}
        </div>
        <span class="per">${L(e.period)}</span>
      </div>
      <div class="meta">${L(e.role)} <span class="ctx">— ${L(e.ctx)}</span></div>
      <ul>${bullets}</ul>
      <div class="stack"><b>stack:</b> ${e.stack}</div>
    </div>
  </div>`;
}



function render(){
  const E = DATA.experience;
  const blocks = [];

  // whoami
  blocks.push(`
  <div class="block reveal" id="whoami" data-key="whoami" data-screen-label="whoami">
    ${prompt("~", "whoami")}
    <div class="out who">
      <div class="name">${L(DATA.name)}</div>
      <div class="role">${L(DATA.role)}</div>
      <div class="status"><span class="pulse"></span>${L(DATA.status)}</div>
    </div>
  </div>`);

  // about
  blocks.push(`
  <div class="block reveal" data-key="about" data-screen-label="about">
    ${prompt("~", "cat about.txt")}
    <div class="out"><p class="about">${L(DATA.about)}</p></div>
  </div>`);

  // skills
  const rows = DATA.skills.map(s=>{
    const parts = s.v.split(" · ").join('<span class="sep"> · </span>');
    return `<dt>${L(s.k)}</dt><dd>${parts}</dd>`;
  }).join("");
  blocks.push(`
  <div class="block reveal" id="skills" data-key="skills" data-screen-label="skills">
    ${prompt("~", "skills --all")}
    <div class="out"><dl class="skills">${rows}</dl></div>
  </div>`);

  // tree (директории кликабельны — ведут к карточкам)
  const tree = E.map((e,i)=>{
    const last = i === E.length-1;
    const b = last ? "└──" : "├──";
    const nda = e.nda ? ` <span class="nda">[NDA]</span>` : "";
    return `<div><span class="branch">${b}</span> <a class="dirlink" href="#exp-${e.id}"><span class="dir">${e.dir}/</span></a>  <span class="when">${L(e.period)}</span>${nda}</div>`;
  }).join("");
  const treeHint = LANG === "ru" ? "# директории кликабельны" : "# directories are clickable";
  blocks.push(`
  <div class="block reveal" id="experience" data-key="tree" data-screen-label="experience tree">
    ${prompt("~", "tree ~/experience")}
    <div class="out tree"><div class="root">~/experience  <span class="cm">${treeHint}</span></div>${tree}</div>
  </div>`);

  // each experience
  E.forEach(e=>{ blocks.push(expCard(e)); });

  // contact json
  const c = DATA.contact;
  blocks.push(`
  <div class="block reveal" id="contact" data-key="contact" data-screen-label="contact">
    ${prompt("~", "cat contact.json")}
    <div class="out json"><span class="br">{</span>
  <span class="k">"email"</span><span class="br">:</span> <span class="v">"<a href="mailto:${c.email}">${c.email}</a>"</span><span class="br">,</span>
  <span class="k">"telegram"</span><span class="br">:</span> <span class="v">"<a href="https://t.me/${c.telegram.replace("@","")}" target="_blank" rel="noopener">${c.telegram}</a>"</span><span class="br">,</span>
  <span class="k">"location"</span><span class="br">:</span> <span class="v">"${L(c.city)}"</span><span class="br">,</span>
  <span class="k">"languages"</span><span class="br">:</span> <span class="v">"${L(c.languages)}"</span>
<span class="br">}</span></div>
  </div>`);

  // end cursor
  blocks.push(`<div class="end reveal" data-key="end">${prompt("~","")}<span class="cur"></span></div>`);

  document.getElementById("term").innerHTML = blocks.join("");

  document.querySelectorAll("[data-ru]").forEach(el=>{ el.textContent = el.getAttribute("data-"+LANG); });
  setupReveal();
}

/* ---- reveal по скроллу + «набор» команды ---- */
function typeCommand(block, onDone){
  const ci = block.querySelector(".ci");
  const target = block.dataset.cmd || "";
  if (!ci || !target){ onDone(); return; }
  block.classList.add("typing");
  let i = 0;
  const tick = ()=>{
    i++;
    ci.textContent = target.slice(0, i);
    if (i < target.length){ setTimeout(tick, 26); }
    else { setTimeout(()=>{ block.classList.remove("typing"); onDone(); }, 160); }
  };
  setTimeout(tick, 120);
}

function setupReveal(){
  if (observer) observer.disconnect();
  const blocks = [...document.querySelectorAll("#term [data-key]")];
  const instant = !typingOn();

  blocks.forEach(b=>{
    const key = b.dataset.key;
    if (PLAYED.has(key) || (reducedMotion())){
      b.classList.add("on","done");
      PLAYED.add(key);
      return;
    }
    if (!instant){
      // спрятать текст команды до «набора»
      const ci = b.querySelector(".ci");
      if (ci){ b.dataset.cmd = ci.textContent; ci.textContent = ""; }
    }
  });

  observer = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{
      if (!en.isIntersecting) return;
      const b = en.target;
      observer.unobserve(b);
      const key = b.dataset.key;
      if (PLAYED.has(key)){ b.classList.add("on","done"); return; }
      b.classList.add("on");
      if (instant){
        b.classList.add("done");
        PLAYED.add(key);
      } else {
        typeCommand(b, ()=>{ b.classList.add("done"); PLAYED.add(key); });
      }
    });
  }, { threshold: 0.12 });

  blocks.forEach(b=>{
    if (!b.classList.contains("done")) observer.observe(b);
  });
}

/* ---- язык ---- */
function setLang(l){
  LANG = l;
  document.documentElement.lang = l;
  document.documentElement.setAttribute("data-lang", l);
  try{ localStorage.setItem("cv-term-lang", l); }catch(e){}
  render();
}

/* ---- печать: раскрыть всё ---- */
let printPrevOpen = null;
window.addEventListener("beforeprint", ()=>{
  printPrevOpen = true;
  document.querySelectorAll("#term [data-key]").forEach(b=>{
    const ci = b.querySelector(".ci");
    if (ci && b.dataset.cmd) ci.textContent = b.dataset.cmd;
    b.classList.add("on","done");
    b.classList.remove("typing");
    PLAYED.add(b.dataset.key);
  });
});
window.addEventListener("afterprint", ()=>{
  printPrevOpen = null;
});

(function(){
  let saved; try{ saved = localStorage.getItem("cv-term-lang"); }catch(e){}
  setLang(saved || "ru");
})();
</script>
